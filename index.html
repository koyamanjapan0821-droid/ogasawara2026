<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f7fbff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="小笠原2026">
  <title>小笠原2026</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-512.png">
  <link rel="apple-touch-icon" href="icon-512.png">
  <link rel="stylesheet" href="style.css?v=20260624v13">
</head>
<body>
  <div id="app" class="app-shell">
    <header class="hero glass">
      <div class="hero-top">
        <div>
          <p class="eyebrow">Ogasawara 2026</p>
          <h1>小笠原2026</h1>
          <p class="subtitle">おじいと赤ちゃん旅のしおり</p>
        </div>
        <button id="installBtn" class="pill hidden">ホームに追加</button>
      </div>
      <div class="hero-grid">
        <div class="metric"><span id="countdown">--</span><small>出発まで</small></div>
        <div class="metric"><span>8/11-16</span><small>2026</small></div>
        <div class="metric"><span id="visitRate">0/0</span><small>訪問済</small></div>
      </div>
    </header>

    <main>
      <section id="home" class="screen active">
        <div class="section-title"><h2>Today</h2><span>今日の予定と父島の天気</span></div>
        <article class="card weather-card">
          <div>
            <p class="label">父島の天気</p>
            <h3 id="weatherNow">読み込み中…</h3>
            <p id="weatherMeta" class="muted">Open-Meteoから取得します</p>
          </div>
          <div class="weather-icon" id="weatherIcon">🌤️</div>
        </article>
        <div id="weatherDays" class="forecast-row"></div>
        <article class="card">
          <p class="label">直近の予定</p>
          <div id="nextPlan" class="timeline compact"></div>
        </article>
        <div class="quick-grid">
          <button class="quick" data-jump="itinerary">📅<span>旅程</span></button>
          <button class="quick" data-jump="spots">📍<span>場所</span></button>
          <button class="quick" data-jump="birds">🐦<span>探鳥</span></button>
          <button class="quick" data-jump="checklist">☑️<span>持物</span></button>
          <button class="quick" data-jump="memo">📝<span>記録</span></button>
        </div>
      </section>

      <section id="itinerary" class="screen">
        <div class="section-title"><h2>Itinerary</h2><span>日別タイムライン</span></div>
        <article class="card itinerary-add-card">
          <button id="addItineraryDayBtn" class="primary full" type="button">日程を追加</button>
        </article>
        <div id="itineraryList"></div>
      </section>

      <section id="spots" class="screen">
        <div class="section-title"><h2>Spots</h2><span>行きたい所・旅行中追加</span></div>
        <div class="toolbar">
          <input id="spotSearch" type="search" placeholder="スポット検索">
          <select id="spotFilter">
            <option value="all">すべて</option><option value="view">展望台</option><option value="beach">海岸</option><option value="shop">買い物</option><option value="base">拠点</option><option value="nature">自然</option><option value="custom">追加</option><option value="favorite">お気に入り</option>
          </select>
        </div>
        <div id="spotList" class="spot-list"></div>
        <button id="addSpotBtn" class="fab" aria-label="スポット追加">＋</button>
      </section>

      <section id="birds" class="screen">
        <div class="section-title"><h2>Birds</h2><span>小笠原で見たい鳥チェック</span></div>
        <div class="toolbar bird-toolbar">
          <input id="birdSearch" type="search" placeholder="鳥名・場所・識別ポイントで検索">
          <select id="birdFilter">
            <option value="all">すべて</option><option value="land">陸鳥</option><option value="sea">海鳥</option><option value="shore">海岸・渡り</option><option value="rare">固有・希少</option>
          </select>
        </div>
        <div id="birdProgress" class="progress-card"></div>
        <div id="birdList" class="bird-list"></div>
        <button id="addBirdBtn" class="fab bird-fab" aria-label="鳥を追加">🐦＋</button>
      </section>

      <section id="checklist" class="screen">
        <div class="section-title"><h2>Checklist</h2><span>持ってくもの</span></div>
        <div id="checkProgress" class="progress-card"></div>
        <article class="card checklist-add-card">
          <label class="label" for="newChecklistItem">持ち物を追加</label>
          <div class="check-add-row">
            <input id="newChecklistItem" type="text" placeholder="例：赤色ライト">
            <button id="addChecklistBtn" class="primary" type="button">追加</button>
          </div>
        </article>
        <div id="checklistItems" class="checklist"></div>
        <button id="resetChecklist" class="secondary full">チェックをリセット</button>
      </section>

      <section id="reservations" class="screen">
        <div class="section-title"><h2>Reservations</h2><span>予約・連絡先・費用メモ</span></div>
        <div id="reservationList"></div>
      </section>

      <section id="memo" class="screen">
        <div class="section-title"><h2>Travel Log</h2><span>旅行中のメモ・写真</span></div>
        <article class="card">
          <label class="label" for="memoDate">日付</label>
          <input id="memoDate" type="date" value="2026-08-11">
          <label class="label" for="memoText">メモ</label>
          <textarea id="memoText" rows="5" placeholder="例：ヤシガニ発見。ぽんちゃん大興奮。"></textarea>
          <label class="label" for="memoPhoto">写真（任意）</label>
          <input id="memoPhoto" type="file" accept="image/*">
          <button id="saveMemo" class="primary full">保存</button>
        </article>
        <div id="memoList"></div>
      </section>
    </main>

    <nav class="tabbar glass">
      <button data-tab="home" class="active">🏝️<span>Home</span></button>
      <button data-tab="itinerary">📅<span>旅程</span></button>
      <button data-tab="spots">📍<span>場所</span></button>
      <button data-tab="birds">🐦<span>探鳥</span></button>
      <button data-tab="checklist">☑️<span>持物</span></button>
      <button data-tab="reservations">🚢<span>予約</span></button>
      <button data-tab="memo">📝<span>記録</span></button>
    </nav>
  </div>


  <dialog id="itineraryEventDialog">
    <form method="dialog" id="itineraryEventForm" class="dialog-card">
      <h3>予定を編集</h3>
      <input id="editEventDayId" type="hidden">
      <input id="editEventId" type="hidden">
      <label class="label" for="editEventTime">時間</label>
      <input id="editEventTime" placeholder="例：午前 / 10:40">
      <label class="label" for="editEventTitle">項目</label>
      <input id="editEventTitle" placeholder="予定名" required>
      <label class="label" for="editEventMemo">備考</label>
      <textarea id="editEventMemo" rows="4" placeholder="メモ・備考"></textarea>
      <div class="dialog-actions"><button id="cancelItineraryEventBtn" type="button" class="secondary">キャンセル</button><button id="saveItineraryEventBtn" type="button" class="primary">保存</button></div>
    </form>
  </dialog>

  <dialog id="spotDialog">
    <form method="dialog" id="spotForm" class="dialog-card">
      <h3>スポット追加</h3>
      <input id="newSpotName" placeholder="名称" required>
      <select id="newSpotCategory"><option value="custom">追加</option><option value="view">展望台</option><option value="beach">海岸</option><option value="shop">買い物</option><option value="base">拠点</option><option value="nature">自然</option></select>
      <input id="newSpotUrl" placeholder="Google Maps URL（任意）">
      <textarea id="newSpotMemo" placeholder="メモ" rows="4"></textarea>
      <div class="dialog-actions"><button id="cancelSpotBtn" type="button" class="secondary">キャンセル</button><button type="submit" class="primary">追加</button></div>
    </form>
  </dialog>


  <dialog id="birdDialog">
    <form method="dialog" id="birdForm" class="dialog-card">
      <h3>鳥を追加</h3>
      <input id="newBirdName" placeholder="鳥の名前" required>
      <select id="newBirdType">
        <option value="land">陸鳥</option>
        <option value="sea">海鳥</option>
        <option value="shore">海岸・渡り</option>
        <option value="rare land">固有・希少</option>
      </select>
      <input id="newBirdDifficulty" placeholder="難易度（任意）">
      <input id="newBirdPlace" placeholder="観察場所（任意）">
      <textarea id="newBirdPoint" placeholder="識別メモ（任意）" rows="3"></textarea>
      <textarea id="newBirdMemo" placeholder="メモ（任意）" rows="3"></textarea>
      <label class="label" for="newBirdPhoto">写真（任意・カメラロールから選択）</label>
      <input id="newBirdPhoto" type="file" accept="image/*">
      <div class="dialog-actions"><button id="cancelBirdBtn" type="button" class="secondary">キャンセル</button><button type="submit" class="primary">追加</button></div>
    </form>
  </dialog>

  <dialog id="photoViewerDialog" class="photo-viewer-dialog">
    <div class="photo-viewer-card">
      <button id="closePhotoViewer" class="photo-viewer-close" type="button" aria-label="写真を閉じる">×</button>
      <img id="photoViewerImg" src="" alt="鳥写真">
      <p id="photoViewerCaption" class="photo-viewer-caption"></p>
    </div>
  </dialog>

  <div id="mascotLayer" aria-hidden="false">
    <div id="mascotBubble" class="mascot-bubble hidden"></div>
    <button id="mascotTomokichi" class="mascot mascot-tomokichi" type="button" aria-label="ともきちキャラ"></button>
    <button id="mascotPonchan" class="mascot mascot-ponchan" type="button" aria-label="ぽんちゃんキャラ"></button>
  </div>

  <script src="app.js?v=20260624v13"></script>
</body>
</html>
